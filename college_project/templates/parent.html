<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Parent Dashboard — BusTrack</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <style>
    body { overflow-y: auto; }
    .dash-wrap { width:100%; max-width:400px; padding: 36px 28px; margin-top: 60px; margin-bottom: 40px; }
    .dash-head { display:flex; align-items:center; gap:14px; margin-bottom:20px; }
    .avatar {
      width:48px; height:48px; border-radius:14px;
      background: linear-gradient(135deg,#3b82f6,#a78bfa);
      display:flex; align-items:center; justify-content:center;
      font-size:20px; font-weight:800; color:#fff; flex-shrink:0;
    }
    .dash-head-info h2 { font-size:18px; font-weight:700; }
    .dash-head-info p  { font-size:13px; color:var(--muted); }
    .menu-list { display:flex; flex-direction:column; gap:8px; }
    .menu-icon svg { width:18px; height:18px; }
  </style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="road-plane"></div>
<div class="particles" id="particles"></div>

<nav class="topbar">
  <span class="topbar-brand">BusTrack</span>
  <div class="topbar-right">
    <span class="topbar-badge"><span class="topbar-dot"></span>Live</span>
    <a href="/logout" class="topbar-logout">Sign Out</a>
  </div>
</nav>

<div class="page-scene">
  <div class="card dash-wrap">
    <div class="dash-head">
      <div class="avatar">{{ (user.full_name or user.username)[0]|upper }}</div>
      <div class="dash-head-info">
        <h2>{{ user.full_name or user.username }}</h2>
        <p>Parent Account</p>
      </div>
    </div>

    <div class="divider"></div>
    <div class="menu-list">

      <a href="/tracking?bus=1" class="menu-btn" id="btn-track">
        <div class="menu-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/>
            <line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/>
            <line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/>
          </svg>
        </div>
        Track Bus Live
      </a>

      <a href="/bus_timing" class="menu-btn" id="btn-timing">
        <div class="menu-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        Bus Timings
      </a>

      <a href="/parent_notifications" class="menu-btn" id="btn-notif">
        <div class="menu-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </div>
        Notifications
      </a>

      <div class="menu-btn" id="btn-child">
        <div class="menu-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </div>
        Child Profile
      </div>

      <a href="/logout" class="menu-btn" id="btn-logout" style="color:rgba(248,113,113,0.85);">
        <div class="menu-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </div>
        Sign Out
      </a>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='css/anim.js') }}"></script>
</body>
</html>
