<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BusTrack — Select Role</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <style>
    body { overflow: hidden; }
    .page-scene { padding-top: 70px; }
    .hero { text-align: center; margin-bottom: 40px; }
    .hero .badge { margin-bottom: 14px; }
    .hero h1 { font-size: clamp(28px,5vw,44px); margin-bottom: 10px; }
    .hero p  { font-size: 15px; color: var(--muted); }

    /* animated route line */
    .route-line {
      position: fixed;
      top: 0; bottom: 0;
      left: 50%;
      width: 1px;
      background: linear-gradient(180deg, transparent, rgba(6,182,212,0.18), transparent);
      z-index: 1;
      pointer-events: none;
    }

    /* role card overrides */
    .role-card-wrap {
      display: grid;
      grid-template-columns: repeat(4, 200px);
      gap: 20px;
      justify-content: center;
    }
    @media(max-width:900px){ .role-card-wrap{ grid-template-columns: repeat(2,180px); } }
    @media(max-width:460px){ .role-card-wrap{ grid-template-columns: repeat(2,1fr); gap:12px; } }

    .role-card { padding: 36px 16px 28px; }
    .role-label { font-size: 16px; font-weight: 700; }
    .role-desc  { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* SVG icons inline */
    .role-icon svg { width: 26px; height: 26px; }
  </style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="road-plane"></div>
<div class="particles" id="particles"></div>

<!-- top bar -->
<nav class="topbar">
  <span class="topbar-brand">BusTrack</span>
  <div class="topbar-right">
    <span class="topbar-badge"><span class="topbar-dot"></span>Live</span>
  </div>
</nav>

<div class="page-scene">
  <div class="hero">
    <div class="badge"><span class="badge-dot"></span>Select Your Role</div>
    <h1>College Bus Time Tracker</h1>
    <p>Real-Time GPS Bus Tracking System</p>
  </div>

  <div class="role-card-wrap">

    <a href="/student" class="role-card" id="role-student">
      <div class="role-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
        </svg>
      </div>
      <div class="role-label">Student</div>
      <div class="role-desc">Track your bus & timings</div>
    </a>

    <a href="/parent" class="role-card" id="role-parent">
      <div class="role-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </div>
      <div class="role-label">Parent</div>
      <div class="role-desc">Monitor your child's bus</div>
    </a>

    <a href="/driver" class="role-card" id="role-driver">
      <div class="role-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="20" height="14" rx="2"/>
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
          <circle cx="7" cy="17" r="1"/><circle cx="17" cy="17" r="1"/>
          <path d="M12 12v4"/>
        </svg>
      </div>
      <div class="role-label">Driver</div>
      <div class="role-desc">Manage your route & location</div>
    </a>

    <a href="/admin" class="role-card" id="role-admin">
      <div class="role-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z"/>
          <path d="M12 8v4l3 3"/>
        </svg>
      </div>
      <div class="role-label">Admin</div>
      <div class="role-desc">Manage system & users</div>
    </a>

  </div>
</div>

<div class="route-line"></div>
<script src="{{ url_for('static', filename='css/anim.js') }}"></script>
</body>
</html>
