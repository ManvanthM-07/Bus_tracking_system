<!DOCTYPE html>
<html>
<head>
    <title>{{ role|capitalize }} Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .signup-card {
            margin-top: 50px;
            width: 380px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            text-align: center;
        }
        .input-box {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            outline: none;
        }
        .input-box::placeholder { color: rgba(255,255,255,0.7); }
        .signup-btn {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(90deg, #ffe082, #facc15);
            color: black;
            font-weight: bold;
            cursor: pointer;
        }
        .error-msg { color: #ff6b6b; margin-bottom: 15px; }
    </style>
</head>
<body>
    <h1>College Bus Time Tracker</h1>
    <div class="signup-card">
        <h2>{{ role|capitalize }} Registration</h2>
        
        {% if error %}
        <div class="error-msg">❌ {{ error }}</div>
        {% endif %}

        <form method="POST" action="/signup/{{ role }}">
            <input class="input-box" type="text" name="username" placeholder="Username" required>
            <input class="input-box" type="password" name="password" placeholder="Password" required>
            
            {% if role == 'student' %}
            <input class="input-box" type="text" name="assigned_bus" placeholder="Assigned Bus ID (e.g. 1)" required>
            <input class="input-box" type="text" name="assigned_stop" placeholder="Assigned Stop Name" required>
            {% elif role == 'parent' %}
            <input class="input-box" type="text" name="student_name" placeholder="Student's Full Name" required>
            {% elif role == 'driver' %}
            <input class="input-box" type="text" name="assigned_bus" placeholder="Assigned Bus ID (e.g. 1)" required>
            {% endif %}

            <button class="signup-btn" type="submit">Complete Sign Up</button>
        </form>
        
        <p style="margin-top:20px; color:white;">Already have an account? <a href="/{{ role }}" style="color:#ffe082;">Login here</a></p>
    </div>
</body>
</html>
