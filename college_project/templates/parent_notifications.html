<!DOCTYPE html>
<html>
<head>

<title>Parent Notifications</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
}

/* TITLE */
.title {
    text-align: center;
    font-size: 40px;
    color: #ffe082;
    margin-top: 40px;
}

/* MAIN CARD */
.container {
    width: 650px;
    margin: 40px auto;
    padding: 30px;
    border-radius: 20px;

    background: rgba(20, 30, 60, 0.75); /* DARK GLASS (NO BLUE FADE) */

    backdrop-filter: blur(12px);

    box-shadow: 0 10px 40px rgba(0,0,0,0.7);
}

/* NOTIFICATION CARD */
.note-card {
    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 16px 20px;
    margin: 14px 0;

    border-radius: 14px;

    background: rgba(255,255,255,0.08);

    border-left: 6px solid #ffe082;

    color: white;

    transition: 0.3s;
}

.note-card:hover {
    transform: scale(1.03);
    background: rgba(255,255,255,0.15);
}

/* TYPES */
.success { border-left: 6px solid #4caf50; }
.warning { border-left: 6px solid #ff9800; }
.danger  { border-left: 6px solid #f44336; }

/* LEFT */
.note-left {
    display: flex;
    align-items: center;
    gap: 12px;
}

/* DOT */
.dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
}

.success .dot { background: #4caf50; }
.warning .dot { background: #ff9800; }
.danger  .dot { background: #f44336; }

/* TEXT */
.note-text {
    font-size: 15px;
}

/* TIME */
.note-time {
    font-size: 12px;
    opacity: 0.7;
}

/* NEW TAG */
.new {
    background: red;
    padding: 3px 7px;
    font-size: 10px;
    border-radius: 6px;
    margin-left: 8px;
}

/* ANIMATION */
.live {
    animation: slide 0.5s ease;
}

@keyframes slide {
    from {
        opacity: 0;
        transform: translateY(-15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* BUTTON */
.back-btn {
    position: fixed;
    bottom: 20px;
    left: 20px;

    padding: 12px 20px;
    border-radius: 20px;

    border: none;

    background: #ffe082;
    cursor: pointer;
}

</style>

</head>

<body>

<h1 class="title">🔔 Parent Notifications</h1>

<div class="container" id="box">

    <!-- STATIC CLEAN -->
    <div class="note-card success">
        <div class="note-left">
            <div class="dot"></div>
            <div class="note-text"><b>Disha</b> 🚌 boarded Bus 1</div>
        </div>
        <div class="note-time">8:05 AM</div>
    </div>

    <div class="note-card success">
        <div class="note-left">
            <div class="dot"></div>
            <div class="note-text"><b>Rahul</b> 📍 reached Kuvempunagar</div>
        </div>
        <div class="note-time">8:15 AM</div>
    </div>

    <div class="note-card danger">
        <div class="note-left">
            <div class="dot"></div>
            <div class="note-text"><b>Sneha</b> ❌ marked absent today</div>
        </div>
        <div class="note-time">9:00 AM</div>
    </div>

</div>

<button class="back-btn" onclick="location.href='/parent'">
← Dashboard
</button>

<script>

/* DATA */
const names = [
    "Disha","Yasaswini","Rahul","Sneha","Arjun",
    "Pooja","Kiran","Megha","Rohit","Ananya"
];

const types = [
    { text: "🚌 boarded Bus 2", cls: "success" },
    { text: "📍 reached Ring Road", cls: "success" },
    { text: "🏫 reached college", cls: "success" },
    { text: "⚠️ bus delayed by 10 mins", cls: "warning" },
    { text: "❌ marked absent today", cls: "danger" }
];

/* LIVE GENERATOR */
function addNotification() {

    let n = names[Math.floor(Math.random()*names.length)];
    let t = types[Math.floor(Math.random()*types.length)];

    let time = new Date().toLocaleTimeString();

    let div = document.createElement("div");
    div.className = `note-card ${t.cls} live`;

    div.innerHTML = `
        <div class="note-left">
            <div class="dot"></div>
            <div class="note-text"><b>${n}</b> ${t.text} <span class="new">NEW</span></div>
        </div>
        <div class="note-time">${time}</div>
    `;

    document.getElementById("box").prepend(div);
}

/* EVERY 5 SEC */
setInterval(addNotification, 5000);

</script>

</body>
</html>
