<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Parent Notifications — BusTrack</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <style>
    body { overflow-y: auto; }
    .notif-wrap { width:100%; max-width:680px; padding:32px 28px; margin-top:60px; margin-bottom:40px; }
    .notif-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
    .notif-head h2 { font-size:22px; font-weight:800;
      background:linear-gradient(135deg,var(--white),var(--cyan));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
    .live-badge {
      font-size:11px;font-weight:600;color:var(--cyan);
      background:rgba(6,182,212,0.1);border:1px solid rgba(6,182,212,0.28);
      border-radius:999px;padding:4px 12px;
    }
    .note {
      display:flex;justify-content:space-between;align-items:center;
      padding:16px 18px;border-radius:14px;
      background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);
      border-left-width:4px; margin-bottom:10px;
      transition:all 0.2s; animation:noteIn 0.35s ease both;
    }
    @keyframes noteIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .note:hover { background:rgba(255,255,255,0.06);transform:translateX(3px); }
    .note.success { border-left-color:#10b981; }
    .note.warning { border-left-color:#f59e0b; }
    .note.danger  { border-left-color:#ef4444; }
    .note-left { display:flex;align-items:center;gap:12px; }
    .dot { width:8px;height:8px;border-radius:50%;flex-shrink:0; }
    .note.success .dot { background:#10b981; }
    .note.warning .dot { background:#f59e0b; }
    .note.danger  .dot { background:#ef4444; }
    .note-text { font-size:14px; font-weight:500; }
    .note-text b { color:var(--white); }
    .note-time { font-size:12px;color:var(--muted);white-space:nowrap;margin-left:12px; }
    .new-badge {
      display:inline-block;background:rgba(239,68,68,0.8);color:#fff;
      font-size:9px;font-weight:700;letter-spacing:0.08em;
      padding:2px 7px;border-radius:999px;margin-left:8px;vertical-align:middle;
    }
    .back-link {
      display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);
      position:fixed;top:18px;left:22px;z-index:99;transition:color 0.2s;
    }
    .back-link:hover{color:var(--white);}
  </style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="road-plane"></div>
<div class="particles" id="particles"></div>

<nav class="topbar">
  <span class="topbar-brand">BusTrack</span>
  <div class="topbar-right">
    <span class="topbar-badge"><span class="topbar-dot"></span>Live</span>
  </div>
</nav>

<a href="/parent_dashboard" class="back-link">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  Dashboard
</a>

<div class="page-scene">
  <div class="card notif-wrap">
    <div class="notif-head">
      <h2>Parent Notifications</h2>
      <span class="live-badge" id="count">3 updates</span>
    </div>

    <div id="box">
      <div class="note success">
        <div class="note-left"><span class="dot"></span><span class="note-text"><b>Disha</b> boarded Bus 1</span></div>
        <span class="note-time">8:05 AM</span>
      </div>
      <div class="note success">
        <div class="note-left"><span class="dot"></span><span class="note-text"><b>Rahul</b> reached Kuvempunagar</span></div>
        <span class="note-time">8:15 AM</span>
      </div>
      <div class="note danger">
        <div class="note-left"><span class="dot"></span><span class="note-text"><b>Sneha</b> marked absent today</span></div>
        <span class="note-time">9:00 AM</span>
      </div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='css/anim.js') }}"></script>
<script>
const names = ["Disha","Yasaswini","Rahul","Sneha","Arjun","Pooja","Kiran","Megha","Rohit","Ananya"];
const types = [
  {text:"boarded Bus 2", cls:"success"},
  {text:"reached Ring Road", cls:"success"},
  {text:"reached college", cls:"success"},
  {text:"bus delayed by 10 mins", cls:"warning"},
  {text:"marked absent today", cls:"danger"}
];
let cnt = 3;
function addNotification() {
  const n = names[Math.floor(Math.random()*names.length)];
  const t = types[Math.floor(Math.random()*types.length)];
  const time = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const div = document.createElement('div');
  div.className = `note ${t.cls}`;
  div.innerHTML = `<div class="note-left"><span class="dot"></span><span class="note-text"><b>${n}</b> ${t.text} <span class="new-badge">NEW</span></span></div><span class="note-time">${time}</span>`;
  document.getElementById('box').prepend(div);
  cnt++;
  document.getElementById('count').textContent = cnt + ' updates';
}
setInterval(addNotification, 5000);
</script>
</body>
</html>
