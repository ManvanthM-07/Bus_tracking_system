<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Route Details — BusTrack</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <style>
    body { overflow-y: auto; }
    .route-wrap { width:100%; max-width:720px; padding:32px 28px; margin-top:60px; margin-bottom:40px; }
    .page-head { margin-bottom:22px; }
    .page-head h2 { font-size:24px; font-weight:800;
      background:linear-gradient(135deg,var(--white),var(--cyan));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
    .page-head p { font-size:13px; color:var(--muted); margin-top:4px; }

    /* Bus tabs */
    .bus-tabs { display:flex; gap:10px; margin-bottom:24px; flex-wrap:wrap; }
    .bus-tab {
      padding:9px 20px; border-radius:10px; font-size:13px; font-weight:600;
      border:1px solid rgba(59,130,246,0.22); background:rgba(59,130,246,0.06);
      color:var(--muted); cursor:pointer; transition:all 0.2s;
    }
    .bus-tab.active,.bus-tab:hover { background:rgba(59,130,246,0.18); border-color:var(--accent); color:var(--white); }

    .route-label { font-size:15px; font-weight:700; color:var(--white); margin-bottom:20px; }

    /* Timeline */
    .timeline { position:relative; padding-left:36px; }
    .timeline::before {
      content:''; position:absolute; left:10px; top:12px; bottom:12px; width:2px;
      background:linear-gradient(180deg, var(--accent), var(--cyan));
      opacity:0.35; border-radius:2px;
    }
    .tl-stop {
      position:relative; margin-bottom:14px; padding:14px 16px;
      border-radius:12px; background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.06);
      cursor:pointer; transition:all 0.2s;
    }
    .tl-stop:hover { background:rgba(59,130,246,0.1); border-color:rgba(59,130,246,0.28); transform:translateX(4px); }
    .tl-stop::before {
      content:''; position:absolute; left:-30px; top:50%; transform:translateY(-50%);
      width:14px; height:14px; border-radius:50%;
      background:var(--blue2); border:2px solid var(--accent);
    }
    .tl-stop.last::before { border-color:var(--gold); background:rgba(245,158,11,0.2); }
    .stop-name { font-size:14px; font-weight:600; }
    .stop-count { font-size:12px; color:var(--muted); margin-top:3px; }

    /* Popup */
    .overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:200;
      display:none; align-items:center; justify-content:center;
    }
    .overlay.show { display:flex; }
    .popup-card {
      background:var(--blue2); border:1px solid var(--border);
      border-radius:20px; padding:28px 32px; max-width:340px; width:90%;
      box-shadow:0 24px 60px rgba(0,0,0,0.7);
    }
    .popup-title { font-size:16px; font-weight:700; margin-bottom:14px; color:var(--white); }
    .student-row {
      display:flex; align-items:center; gap:10px;
      padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.06);
      font-size:14px;
    }
    .student-row:last-child { border-bottom:none; }
    .student-avatar {
      width:32px;height:32px;border-radius:8px;
      background:rgba(59,130,246,0.15);display:flex;align-items:center;
      justify-content:center;font-size:12px;font-weight:700;color:var(--cyan);flex-shrink:0;
    }
    .student-name { font-weight:500; }
    .student-phone { font-size:12px; color:var(--muted); }
    .popup-close {
      margin-top:18px;width:100%;padding:10px;
      background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.28);
      color:var(--cyan);border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;
      transition:background 0.2s;
    }
    .popup-close:hover { background:rgba(59,130,246,0.22); }

    .back-link {
      display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);
      position:fixed;top:18px;left:22px;z-index:99;transition:color 0.2s;
    }
    .back-link:hover{color:var(--white);}
  </style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="road-plane"></div>
<div class="particles" id="particles"></div>

<nav class="topbar">
  <span class="topbar-brand">BusTrack</span>
  <div class="topbar-right">
    <span class="topbar-badge"><span class="topbar-dot"></span>Live</span>
  </div>
</nav>

<a href="/student_dashboard" class="back-link">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  Dashboard
</a>

<div class="page-scene">
  <div class="card route-wrap">
    <div class="page-head">
      <div class="badge"><span class="badge-dot"></span>Route Map</div>
      <h2>Route Details</h2>
      <p>Click any stop to see students boarding there</p>
    </div>

    <div class="bus-tabs">
      <div class="bus-tab active" id="tab-1" onclick="selectBus(1)">Bus 1 — Main Route</div>
      <div class="bus-tab" id="tab-2" onclick="selectBus(2)">Bus 2 — Ring Route</div>
      <div class="bus-tab" id="tab-3" onclick="selectBus(3)">Bus 3 — City Route</div>
    </div>

    <div class="route-label" id="routeLabel">Bus 1 — Main Route</div>
    <div class="timeline" id="timeline"></div>
  </div>
</div>

<!-- Popup -->
<div class="overlay" id="overlay" onclick="closePopup()">
  <div class="popup-card" onclick="event.stopPropagation()">
    <div class="popup-title" id="popupStop">Stop</div>
    <div id="studentList"></div>
    <button class="popup-close" onclick="closePopup()">Close</button>
  </div>
</div>

<script src="{{ url_for('static', filename='css/anim.js') }}"></script>
<script>
const data = {
  1:[["Main Gate",[["Rahul","9876543210"],["Ananya","9123456789"]]],["Kuvempunagar",[["Sneha","9871234567"]]],["Saraswathipuram",[["Kiran","9888765432"]]],["Vani Vilas",[["Rohit","9666543210"]]],["Lakshmipuram",[["Vikas","9444321098"]]],["Market",[["Ajay","9222109876"]]],["KR Circle",[["Manoj","9001234567"]]],["Railway",[["Sanjay","9023456789"]]],["Bus Stand",[["Nikhil","9045678901"]]],["College",[["All Students","--"]]]],
  2:[["Bogadi",[["Rahul","9876543210"]]],["Vijayanagar",[["Sneha","9871234567"]]],["Ring Road",[["Kiran","9888765432"]]],["KRS Road",[["Rohit","9666543210"]]],["Hebbal",[["Vikas","9444321098"]]],["Infosys",[["Ajay","9222109876"]]],["Metagalli",[["Manoj","9001234567"]]],["Industrial",[["Sanjay","9023456789"]]],["Signal",[["Nikhil","9045678901"]]],["College",[["All Students","--"]]]],
  3:[["Nazarbad",[["Rahul","9876543210"]]],["Ashoka Road",[["Sneha","9871234567"]]],["Double Road",[["Kiran","9888765432"]]],["JLB Road",[["Rohit","9666543210"]]],["Devaraj Urs",[["Vikas","9444321098"]]],["Circle",[["Ajay","9222109876"]]],["Mandi",[["Manoj","9001234567"]]],["Road",[["Sanjay","9023456789"]]],["Palace",[["Nikhil","9045678901"]]],["College",[["All Students","--"]]]]
};
const routeNames = {1:"Bus 1 — Main Route",2:"Bus 2 — Ring Route",3:"Bus 3 — City Route"};
let activeBus = 1;
function selectBus(id){
  activeBus = id;
  document.querySelectorAll('.bus-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  document.getElementById('routeLabel').textContent = routeNames[id];
  const stops = data[id];
  document.getElementById('timeline').innerHTML = stops.map(([name,students],i)=>`
    <div class="tl-stop ${i===stops.length-1?'last':''}" onclick="showPopup(${id},'${name}')">
      <div class="stop-name">${name}</div>
      <div class="stop-count">${students.length} student${students.length!==1?'s':''} boarding</div>
    </div>`).join('');
}
function showPopup(bus,name){
  document.getElementById('popupStop').textContent = name;
  const students = data[bus].find(s=>s[0]===name)[1];
  document.getElementById('studentList').innerHTML = students.map(([n,p])=>`
    <div class="student-row">
      <div class="student-avatar">${n[0]}</div>
      <div><div class="student-name">${n}</div><div class="student-phone">${p}</div></div>
    </div>`).join('');
  document.getElementById('overlay').classList.add('show');
}
function closePopup(){ document.getElementById('overlay').classList.remove('show'); }
selectBus(1);
</script>
</body>
</html>
