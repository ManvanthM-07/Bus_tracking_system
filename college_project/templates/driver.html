<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Driver Dashboard — BusTrack</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <style>
      body {
        overflow-y: auto;
      }
      .dash-wrap {
        width: 100%;
        max-width: 400px;
        padding: 36px 28px;
        margin-top: 60px;
        margin-bottom: 40px;
      }
      .dash-head {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 20px;
      }
      .avatar {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        background: linear-gradient(135deg, #f59e0b, #ef4444);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        font-weight: 800;
        color: #fff;
        flex-shrink: 0;
      }
      .dash-head-info h2 {
        font-size: 18px;
        font-weight: 700;
      }
      .dash-head-info p {
        font-size: 13px;
        color: var(--muted);
      }
      .bus-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(245, 158, 11, 0.1);
        border: 1px solid rgba(245, 158, 11, 0.3);
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 600;
        color: #fbbf24;
        margin-bottom: 16px;
      }
      .menu-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .menu-icon svg {
        width: 18px;
        height: 18px;
      }
    </style>
  </head>
  <body>
    <canvas id="stars"></canvas>
    <div class="road-plane"></div>
    <div class="particles" id="particles"></div>

    <nav class="topbar">
      <span class="topbar-brand">BusTrack</span>
      <div class="topbar-right">
        <span class="topbar-badge"
          ><span class="topbar-dot"></span>On Route</span
        >
        <a href="/logout" class="topbar-logout">Sign Out</a>
      </div>
    </nav>

    <div class="page-scene">
      <div class="card dash-wrap">
        <div class="dash-head">
          <div class="avatar">
            {{ (user.full_name or user.username)[0]|upper }}
          </div>
          <div class="dash-head-info">
            <h2>{{ user.full_name or user.username }}</h2>
            <p>Driver Account</p>
          </div>
        </div>

        <div class="bus-chip">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <rect x="2" y="7" width="20" height="14" rx="2" />
            <circle cx="7" cy="21" r="1" />
            <circle cx="17" cy="21" r="1" />
            <path d="M2 11h20M12 7V3M8 7V3M16 7V3" />
          </svg>
          Assigned Bus: {{ user.assigned_bus or "No Bus Assigned" }}
        </div>

        <div class="divider"></div>
        <div class="menu-list">
          <div class="menu-btn" id="btn-location">
            <div class="menu-icon">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="#06b6d4"
                stroke-width="2"
                stroke-linecap="round"
              >
                <circle cx="12" cy="12" r="10" />
                <circle cx="12" cy="12" r="3" />
                <line x1="12" y1="2" x2="12" y2="6" />
                <line x1="12" y1="18" x2="12" y2="22" />
                <line x1="2" y1="12" x2="6" y2="12" />
                <line x1="18" y1="12" x2="22" y2="12" />
              </svg>
            </div>
            Update Location
          </div>

          <a href="/route_details" class="menu-btn" id="btn-route">
            <div class="menu-icon">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="#f59e0b"
                stroke-width="2"
                stroke-linecap="round"
              >
                <path d="M3 12h18M3 6h18M3 18h18" />
              </svg>
            </div>
            Route Details
          </a>

          <div class="menu-btn" id="btn-notif">
            <div class="menu-icon">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="#a78bfa"
                stroke-width="2"
                stroke-linecap="round"
              >
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
              </svg>
            </div>
            Notifications
          </div>

          <a
            href="/logout"
            class="menu-btn"
            id="btn-logout"
            style="color: rgba(248, 113, 113, 0.85)"
          >
            <div class="menu-icon">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="#f87171"
                stroke-width="2"
                stroke-linecap="round"
              >
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" y1="12" x2="9" y2="12" />
              </svg>
            </div>
            Sign Out
          </a>
        </div>
      </div>
    </div>
    <script src="{{ url_for('static', filename='css/anim.js') }}"></script>
  </body>
</html>
