<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BusTrack — Welcome</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <style>
      .welcome-scene {
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 10;
        text-align: center;
      }

      .stats-row {
        display: flex;
        gap: 20px;
        margin: 40px 0;
        justify-content: center;
      }

      .stat-pill {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 20px 40px;
        border-radius: 20px;
        min-width: 150px;
        backdrop-filter: blur(10px);
      }

      .stat-val {
        display: block;
        font-size: 32px;
        font-weight: 700;
        color: var(--neon-cyan);
        margin-bottom: 5px;
      }

      .stat-lab {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 2px;
        opacity: 0.5;
      }

      .hud-corner {
        position: fixed;
        padding: 20px;
        font-family: monospace;
        z-index: 100;
        pointer-events: none;
      }

      .hud-tl {
        top: 0;
        left: 0;
      }
      .hud-tr {
        top: 0;
        right: 0;
        text-align: right;
      }
      .hud-bl {
        bottom: 0;
        left: 0;
      }
      .hud-br {
        bottom: 0;
        right: 0;
        text-align: right;
      }

      .hud-label {
        display: block;
        font-size: 10px;
        opacity: 0.5;
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      .hud-value {
        display: block;
        font-size: 14px;
        color: var(--neon-cyan);
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="cursor"></div>
    <div id="aura"></div>
    <canvas id="particle-field"></canvas>

    <!-- HUD ELEMENTS (REMOVED AS PER REQUEST) -->
    <div class="hud-corner hud-tl">
    </div>
    <div class="hud-corner hud-tr">
    </div>
    <div class="hud-corner hud-bl">
    </div>
    <div class="hud-corner hud-br">
    </div>

    <div class="welcome-scene">
      <div
        class="topbar-badge"
        style="
          margin-bottom: 20px;
          border-color: var(--neon-cyan);
          color: var(--neon-cyan);
        "
      >
        <span class="topbar-dot" style="background: var(--neon-cyan)"></span>
        Live Tracking Active
      </div>

      <h1 class="hero-title" style="font-size: 72px">RouteX</h1>
      <p
        class="hero-sub"
        style="max-width: 600px; margin: 0 auto; opacity: 0.7"
      >
        Precision tracking for the modern student. Know exactly where your bus
        is, every second of the journey.
      </p>

      <div class="stats-row">
        <div class="stat-pill">
          <span class="stat-val">{{ bus_count|default(0) }}</span>
          <span class="stat-lab">Buses</span>
        </div>
        <div class="stat-pill">
          <span class="stat-val">{{ stop_count|default(0) }}</span>
          <span class="stat-lab">Stops</span>
        </div>
        <div
          class="stat-pill"
          style="
            background: rgba(189, 0, 255, 0.1);
            border-color: var(--neon-purple);
          "
        >
          <span class="stat-val" style="color: var(--neon-purple)">Live</span>
          <span class="stat-lab">Tracking</span>
        </div>
      </div>

      <a
        href="/home"
        class="magnetic-btn"
        style="
          padding: 20px 80px;
          font-size: 20px;
          border-radius: 50px;
          background: var(--neon-cyan);
          color: #000;
          text-decoration: none;
          font-weight: 700;
          display: inline-block;
          margin-top: 20px;
        "
        >Get Started</a
      >
    </div>

    <script src="{{ url_for('static', filename='css/anim.js') }}"></script>
  </body>
</html>
