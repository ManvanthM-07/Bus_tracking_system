<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BusTrack — College Bus Tracking System</title>
  <meta name="description" content="Smart Real-Time College Bus Tracking System. Know where your bus is, in real time." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #060b1a;
      --blue1:  #0a1628;
      --blue2:  #0d2045;
      --accent: #3b82f6;
      --cyan:   #06b6d4;
      --gold:   #f59e0b;
      --white:  #f1f5f9;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--navy);
      color: var(--white);
      overflow: hidden;
    }

    /* ── STARFIELD ── */
    canvas#stars {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── GRID ROAD PLANE ── */
    .road-plane {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 220vw;
      height: 55vh;
      background:
        linear-gradient(rgba(6,182,212,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6,182,212,0.07) 1px, transparent 1px),
        linear-gradient(180deg, #060b1a 0%, #0d2045 100%);
      background-size: 80px 80px, 80px 80px, 100% 100%;
      transform-origin: bottom center;
      transform: translateX(-50%) perspective(900px) rotateX(60deg);
      z-index: 1;
      border-top: 2px solid rgba(6,182,212,0.25);
    }

    /* centre lane dashes */
    .road-plane::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      left: 50%;
      width: 6px;
      transform: translateX(-50%);
      background: repeating-linear-gradient(
        180deg,
        rgba(245,158,11,0.8) 0px, rgba(245,158,11,0.8) 40px,
        transparent 40px, transparent 80px
      );
      animation: laneDash 1s linear infinite;
    }
    @keyframes laneDash {
      from { background-position: 0 0; }
      to   { background-position: 0 80px; }
    }

    /* ── SCENE WRAPPER ── */
    .scene {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── 3-D BUS SVG ── */
    .bus-wrap {
      position: relative;
      width: 260px;
      height: 130px;
      margin-bottom: 36px;
      filter: drop-shadow(0 20px 40px rgba(59,130,246,0.5));
      animation: busFloat 4s ease-in-out infinite;
    }
    @keyframes busFloat {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-12px); }
    }

    /* headlight glow */
    .bus-wrap::after {
      content: '';
      position: absolute;
      right: -30px;
      top: 50%;
      transform: translateY(-50%);
      width: 60px;
      height: 30px;
      background: radial-gradient(ellipse, rgba(245,158,11,0.7), transparent 70%);
      border-radius: 50%;
      animation: headlight 1.5s ease-in-out infinite alternate;
    }
    @keyframes headlight {
      from { opacity: 0.5; }
      to   { opacity: 1.0; }
    }

    /* ── CARD ── */
    .card {
      background: rgba(13, 32, 69, 0.55);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 24px;
      padding: 48px 56px;
      text-align: center;
      max-width: 500px;
      width: 90%;
      box-shadow:
        0 0 0 1px rgba(6,182,212,0.1),
        0 30px 80px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(255,255,255,0.06);
      animation: cardIn 1s cubic-bezier(0.16,1,0.3,1) both;
      position: relative;
      overflow: hidden;
    }
    /* card top glow strip */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), var(--accent), transparent);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    /* badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--cyan);
      background: rgba(6,182,212,0.1);
      border: 1px solid rgba(6,182,212,0.3);
      border-radius: 999px;
      padding: 4px 14px;
      margin-bottom: 20px;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--cyan);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.4; transform:scale(0.7); }
    }

    h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #f1f5f9 30%, var(--cyan) 70%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 14px;
    }

    .sub {
      font-size: 15px;
      font-weight: 400;
      color: rgba(241,245,249,0.55);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    /* stats row */
    .stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 36px;
    }
    .stat { text-align: center; }
    .stat-num {
      font-size: 22px;
      font-weight: 700;
      color: var(--gold);
    }
    .stat-label {
      font-size: 11px;
      color: rgba(241,245,249,0.4);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .stat-div {
      width: 1px;
      background: rgba(255,255,255,0.08);
      align-self: stretch;
    }

    /* CTA button */
    .btn {
      display: inline-block;
      padding: 15px 40px;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #fff;
      background: linear-gradient(135deg, var(--accent) 0%, var(--cyan) 100%);
      border: none;
      border-radius: 14px;
      cursor: pointer;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 30px rgba(59,130,246,0.45);
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.18), transparent);
      border-radius: inherit;
    }
    .btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 14px 40px rgba(59,130,246,0.6);
    }
    .btn:active { transform: scale(0.98); }

    /* arrow inside button */
    .btn-arrow {
      display: inline-block;
      margin-left: 8px;
      transition: transform 0.2s;
    }
    .btn:hover .btn-arrow { transform: translateX(4px); }

    /* floating particles */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }
    .p {
      position: absolute;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0;
      animation: floatP var(--dur, 8s) var(--delay, 0s) ease-in-out infinite;
    }
    @keyframes floatP {
      0%   { opacity: 0;   transform: translateY(100vh) scale(0); }
      10%  { opacity: 0.5; }
      90%  { opacity: 0.2; }
      100% { opacity: 0;   transform: translateY(-10vh) scale(1); }
    }

    /* corner location pins */
    .pin {
      position: fixed;
      z-index: 3;
    }
    .pin svg { display: block; }
    .pin-tl { top: 12%; left: 8%; animation: pinBob 3s ease-in-out infinite; }
    .pin-br { bottom: 22%; right: 6%; animation: pinBob 3s ease-in-out infinite 1.5s; }
    @keyframes pinBob {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    /* signal tower icon (top-right) */
    .signal {
      position: fixed;
      top: 10%;
      right: 7%;
      z-index: 3;
      opacity: 0.8;
      animation: signalPulse 2s ease-in-out infinite;
    }
    @keyframes signalPulse {
      0%,100% { opacity: 0.8; }
      50%      { opacity: 0.3; }
    }

  </style>
</head>

<body>

<!-- Starfield canvas -->
<canvas id="stars"></canvas>

<!-- Road grid -->
<div class="road-plane"></div>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<!-- Location pin top-left -->
<div class="pin pin-tl">
  <svg width="36" height="44" viewBox="0 0 36 44" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M18 0C8.06 0 0 8.06 0 18c0 13.5 18 26 18 26S36 31.5 36 18C36 8.06 27.94 0 18 0Z" fill="#3b82f6" opacity="0.9"/>
    <circle cx="18" cy="18" r="7" fill="white" opacity="0.95"/>
  </svg>
</div>

<!-- Location pin bottom-right -->
<div class="pin pin-br">
  <svg width="28" height="34" viewBox="0 0 36 44" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M18 0C8.06 0 0 8.06 0 18c0 13.5 18 26 18 26S36 31.5 36 18C36 8.06 27.94 0 18 0Z" fill="#06b6d4" opacity="0.85"/>
    <circle cx="18" cy="18" r="7" fill="white" opacity="0.9"/>
  </svg>
</div>

<!-- Signal / WiFi tower (top-right) -->
<div class="signal">
  <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M20 28 L20 38" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M14 22 Q20 14 26 22" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M8 16 Q20 2 32 16" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.7"/>
    <circle cx="20" cy="28" r="3" fill="#f59e0b"/>
  </svg>
</div>

<!-- Main scene -->
<div class="scene">

  <!-- 3-D Bus SVG -->
  <div class="bus-wrap">
    <svg viewBox="0 0 260 120" xmlns="http://www.w3.org/2000/svg" width="260" height="120">
      <!-- shadow -->
      <ellipse cx="130" cy="116" rx="100" ry="6" fill="rgba(0,0,0,0.35)"/>

      <!-- body top face -->
      <path d="M20 30 L240 30 L240 85 L20 85 Z" rx="6" fill="#1e3a8a"/>
      <!-- body side highlight -->
      <path d="M20 30 L240 30 L240 38 L20 38 Z" fill="#2563eb" opacity="0.6"/>

      <!-- roof -->
      <path d="M24 18 L236 18 L240 30 L20 30 Z" fill="#1d4ed8"/>

      <!-- undercarriage -->
      <rect x="20" y="85" width="220" height="12" rx="3" fill="#1e3a8a"/>

      <!-- windows - main strip -->
      <rect x="36" y="38" width="178" height="30" rx="4" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.5)" stroke-width="1"/>
      <!-- window dividers -->
      <line x1="88"  y1="38" x2="88"  y2="68" stroke="rgba(6,182,212,0.4)" stroke-width="1"/>
      <line x1="140" y1="38" x2="140" y2="68" stroke="rgba(6,182,212,0.4)" stroke-width="1"/>
      <line x1="192" y1="38" x2="192" y2="68" stroke="rgba(6,182,212,0.4)" stroke-width="1"/>

      <!-- window inner glow -->
      <rect x="37" y="39" width="50" height="28" rx="3" fill="rgba(6,182,212,0.08)"/>
      <rect x="89" y="39" width="50" height="28" rx="3" fill="rgba(6,182,212,0.08)"/>
      <rect x="141" y="39" width="50" height="28" rx="3" fill="rgba(6,182,212,0.08)"/>
      <rect x="193" y="39" width="20" height="28" rx="3" fill="rgba(6,182,212,0.08)"/>

      <!-- door -->
      <rect x="21" y="40" width="14" height="38" rx="2" fill="rgba(255,255,255,0.04)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>

      <!-- headlight (right) -->
      <rect x="233" y="55" width="8" height="14" rx="3" fill="#f59e0b"/>
      <ellipse cx="241" cy="62" rx="12" ry="6" fill="rgba(245,158,11,0.3)"/>

      <!-- tail-light (left) -->
      <rect x="19" y="55" width="5" height="14" rx="2" fill="#ef4444"/>

      <!-- front bumper -->
      <rect x="234" y="82" width="12" height="6" rx="2" fill="#374151"/>

      <!-- wheels -->
      <!-- front -->
      <circle cx="200" cy="97" r="14" fill="#111827"/>
      <circle cx="200" cy="97" r="9"  fill="#1f2937"/>
      <circle cx="200" cy="97" r="4"  fill="#374151"/>
      <!-- spokes -->
      <line x1="200" y1="83" x2="200" y2="97" stroke="#4b5563" stroke-width="2"/>
      <line x1="200" y1="111" x2="200" y2="97" stroke="#4b5563" stroke-width="2"/>
      <line x1="186" y1="97" x2="200" y2="97" stroke="#4b5563" stroke-width="2"/>
      <line x1="214" y1="97" x2="200" y2="97" stroke="#4b5563" stroke-width="2"/>

      <!-- rear -->
      <circle cx="60"  cy="97" r="14" fill="#111827"/>
      <circle cx="60"  cy="97" r="9"  fill="#1f2937"/>
      <circle cx="60"  cy="97" r="4"  fill="#374151"/>
      <line x1="60" y1="83"  x2="60" y2="97"  stroke="#4b5563" stroke-width="2"/>
      <line x1="60" y1="111" x2="60" y2="97"  stroke="#4b5563" stroke-width="2"/>
      <line x1="46" y1="97"  x2="60" y2="97"  stroke="#4b5563" stroke-width="2"/>
      <line x1="74" y1="97"  x2="60" y2="97"  stroke="#4b5563" stroke-width="2"/>

      <!-- BUSTRACK label on body -->
      <text x="120" y="78" font-family="Inter,sans-serif" font-size="9" font-weight="700"
            fill="rgba(6,182,212,0.7)" text-anchor="middle" letter-spacing="2">COLLEGE BUS</text>

      <!-- accent stripe -->
      <rect x="20" y="70" width="220" height="3" fill="rgba(6,182,212,0.4)"/>
      <rect x="20" y="74" width="220" height="1.5" fill="rgba(245,158,11,0.5)"/>
    </svg>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="badge"><span class="badge-dot"></span>Live Tracking Active</div>
    <h1>College Bus<br/>Time Tracker</h1>
    <p class="sub">Know exactly where your bus is — in real time.<br/>Smart routing, live ETAs, instant alerts.</p>

    <div class="stats">
      <div class="stat">
        <div class="stat-num">12</div>
        <div class="stat-label">Buses</div>
      </div>
      <div class="stat-div"></div>
      <div class="stat">
        <div class="stat-num">48</div>
        <div class="stat-label">Stops</div>
      </div>
      <div class="stat-div"></div>
      <div class="stat">
        <div class="stat-num">Live</div>
        <div class="stat-label">Updates</div>
      </div>
    </div>

    <a class="btn" href="/home" id="start-tracking-btn">
      Start Tracking <span class="btn-arrow">→</span>
    </a>
  </div>

</div>

<script>
  /* ── Starfield ── */
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = Array.from({length: 180}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height * 0.65,
      r: Math.random() * 1.4 + 0.3,
      a: Math.random(),
      speed: Math.random() * 0.008 + 0.003
    }));
  }
  function drawStars(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.a = 0.3 + 0.7 * Math.abs(Math.sin(t * s.speed));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(241,245,249,${s.a})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  resize();
  window.addEventListener('resize', resize);
  requestAnimationFrame(drawStars);

  /* ── Floating Particles ── */
  const pContainer = document.getElementById('particles');
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'p';
    const size = Math.random() * 4 + 2;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      --dur:${Math.random()*10+8}s;
      --delay:${Math.random()*10}s;
      background:${Math.random()>0.5?'#3b82f6':'#06b6d4'};
    `;
    pContainer.appendChild(p);
  }
</script>

</body>
</html>
