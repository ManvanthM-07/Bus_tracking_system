<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Dashboard — BusTrack</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <style>
      body { overflow:hidden; }
      .page-scene {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 80px 20px 20px;
        z-index: 10;
        overflow-y: auto;
        pointer-events: none;
      }
      .dash-wrap {
        pointer-events: auto;
        margin: auto;
      }
    </style>
  </head>
  <body>
    <div id="cursor"></div>
    <div id="aura"></div>
    <canvas id="stars"></canvas>
    <div class="road-plane"></div>
    <div class="particles" id="particles"></div>

    <nav class="topbar">
      <div style="display:flex; align-items:center; gap:16px;">
        <a href="/home" class="menu-icon" style="width:36px; height:36px; text-decoration:none; color:var(--cyan);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        </a>
        <div class="topbar-brand">BusTrack</div>
      </div>
      <div style="display:flex; gap:20px;">
        <div class="badge">
          <span class="badge-dot"></span>
          Live System
        </div>
        <a href="/logout" class="badge" style="text-decoration:none; border-color:rgba(239,68,68,0.3); color:#f87171;">Logout</a>
      </div>
    </nav>

    <div class="page-scene">
      <div class="card dash-wrap">
        <div class="dash-head">
          <div class="avatar">
            {{ (user.full_name or user.username)[0]|upper }}
          </div>
          <div class="dash-head-info">
            <h2>{{ user.full_name or user.username }}</h2>
            <p>Student Account</p>
          </div>
        </div>

        <div class="info-grid">
          <div class="info-chip">
            <div class="info-chip-label">Bus ID</div>
            <div class="info-chip-value">{{ user.assigned_bus or "Not Assigned" }}</div>
          </div>
          <div class="info-chip">
            <div class="info-chip-label">Required Stop</div>
            <div class="info-chip-value">{{ user.assigned_stop or "N/A" }}</div>
          </div>
        </div>

        <div class="divider"></div>
        <div class="menu-list">
          <a href="/tracking?bus=1" class="menu-btn" id="btn-track">
            <div class="menu-icon">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="#06b6d4"
                stroke-width="2"
                stroke-linecap="round"
              >
                <circle cx="12" cy="12" r="10" />
                <circle cx="12" cy="12" r="3" />
                <line x1="12" y1="2" x2="12" y2="6" />
                <line x1="12" y1="18" x2="12" y2="22" />
                <line x1="2" y1="12" x2="6" y2="12" />
                <line x1="18" y1="12" x2="22" y2="12" />
              </svg>
            </div>
            Track Bus Live
          </a>

          <a href="/bus_timing" class="menu-btn" id="btn-timing">
            <div class="menu-icon">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="#3b82f6"
                stroke-width="2"
                stroke-linecap="round"
              >
                <circle cx="12" cy="12" r="10" />
                <polyline points="12 6 12 12 16 14" />
              </svg>
            </div>
            Bus Timings
          </a>

          <a href="/route_details" class="menu-btn" id="btn-route">
            <div class="menu-icon">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="#f59e0b"
                stroke-width="2"
                stroke-linecap="round"
              >
                <path d="M3 12h18M3 6h18M3 18h18" />
              </svg>
            </div>
            Route Details
          </a>

          <a href="/notifications" class="menu-btn" id="btn-notif">
            <div class="menu-icon">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="#a78bfa"
                stroke-width="2"
                stroke-linecap="round"
              >
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
              </svg>
            </div>
            Notifications
          </a>

          <a
            href="/logout"
            class="menu-btn"
            id="btn-logout"
            style="color: rgba(248, 113, 113, 0.85)"
          >
            <div class="menu-icon">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="#f87171"
                stroke-width="2"
                stroke-linecap="round"
              >
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" y1="12" x2="9" y2="12" />
              </svg>
            </div>
            Sign Out
          </a>
        </div>
      </div>
    </div>
    <script src="{{ url_for('static', filename='css/anim.js') }}"></script>
  </body>
</html>
